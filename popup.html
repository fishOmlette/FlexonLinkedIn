<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex on LinkedIn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-main">
                <div class="logo-container">
                    <img src="icons/icon128.png" alt="Logo" class="logo">
                </div>
                <div class="title-container">
                    <h1>Flex on LinkedIn</h1>
                    <p class="tagline">puzzle solver when your minds a mess.</p>
                </div>
            </div>
        </header>

        <main>
            <div class="games-section">
                <h3>Supported Games</h3>
                <div class="games-grid">
                    <span>✏️ Sudoku</span>
                    <span>👑 Queens</span>
                    <span>🧩 Patches</span>
                    <span>⚡ Zip</span>
                    <span>💃 Tango</span>
                </div>
            </div>

            <div class="play-section">
                <button id="play-btn" class="sketchy-btn">
                    <img src="assets/game.svg" class="btn-icon" alt=""> Flex Arcade
                </button>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <div class="footer-top">
                    <span class="version">v0.2605.1</span>
                    <span class="motto">never stop flexing on LinkedIn</span>
                </div>
                <a href="https://github.com/fishOmlette/FlexonLinkedIn/issues" target="_blank" class="report-link">Report Issue</a>
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
